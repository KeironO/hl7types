name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv run pytest --cov=hl7types --cov-report=xml
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  build-and-publish:
    needs: coverage
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Check distribution
        run: uv run --with twine twine check dist/*

      - name: Smoke-test wheel
        run: |
          uv venv /tmp/wheel-smoke --python 3.12
          uv pip install --python /tmp/wheel-smoke/bin/python dist/*.whl
          /tmp/wheel-smoke/bin/python - <<'EOF'
          import hl7types
          from hl7types import decode_er7, HL7Registry
          from hl7types.hl7.v2_5_1.segments import MSH, MSA
          from hl7types.hl7.v2_5_1.messages import ACK
          import importlib.resources, pathlib
          pkg = importlib.resources.files("hl7types")
          assert (pathlib.Path(str(pkg)) / "py.typed").exists(), "py.typed missing from wheel"
          print("Wheel smoke test passed")
          EOF

      - name: Publish
        run: uv publish
