[changelog]
header = "# Changelog\n\nAll notable changes to hl7types are documented here.\n\n"
body = """
{% if version %}## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## Unreleased{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}\n
"""
trim = true

[git]
commit_preprocessors = [
  { pattern = '\n[\s\S]*', replace = "" },
]
conventional_commits = false
filter_unconventional = false
commit_parsers = [
  { message = "^[Ff]eat", group = "Features" },
  { message = "^[Bb]ug", group = "Bug Fixes" },
  { message = "^[Ff]ix", group = "Bug Fixes" },
  { message = "^[Rr]efactor", group = "Refactoring" },
  { message = "^[Dd]oc", group = "Documentation" },
  { message = "^[Tt]est", group = "Testing" },
  { message = "^[Cc]hore", group = "Chores" },
  { message = ".*", group = "Changes" },
]
filter_commits = false
tag_pattern = "[0-9].*"
